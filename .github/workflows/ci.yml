name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest -q
        env:
          USTA_ANTHROPIC_API_KEY: test-key

  mobile:
    name: Mobile (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  i18n-parity:
    name: i18n tr/en parite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: tr/en anahtar kümeleri eşit mi
        run: |
          python - <<'PY'
          import json, sys
          tr = json.load(open("mobile/locales/tr.json"))
          en = json.load(open("mobile/locales/en.json"))
          def flat(d, p=""):
              o = {}
              for k, v in d.items():
                  o.update(flat(v, p + k + ".")) if isinstance(v, dict) else o.setdefault(p + k, v)
              return o
          t, e = set(flat(tr)), set(flat(en))
          if t != e:
              print("tr-only:", t - e)
              print("en-only:", e - t)
              sys.exit(1)
          print(f"PARITE OK ({len(t)} anahtar)")
          PY
